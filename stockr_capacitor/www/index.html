<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stockr</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <span class="header-title">Stockr</span>
            <span class="header-icon" id="profileIcon">👤</span>
        </div>
        
        <!-- Contenu principal -->
        <div id="content" class="content">
            <div class="loading">Chargement...</div>
        </div>
        
        <!-- Barre de navigation -->
        <div class="tabs">
            <button class="tab active" data-tab="stock">
                <span class="tab-icon">📦</span>
                <span>Stock</span>
            </button>
            <button class="tab" data-tab="products">
                <span class="tab-icon">🏷️</span>
                <span>Produits</span>
            </button>
            <button class="tab" data-tab="sales">
                <span class="tab-icon">💰</span>
                <span>Ventes</span>
            </button>
            <button class="tab" data-tab="alerts">
                <span class="tab-icon">⚠️</span>
                <span>Alertes</span>
            </button>
            <button class="tab" data-tab="financial">
                <span class="tab-icon">📊</span>
                <span>Bilan</span>
            </button>
        </div>
        
        <!-- Bouton flottant (apparaît sur certains écrans) -->
        <button class="fab" id="fab" style="display: none;">+</button>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
