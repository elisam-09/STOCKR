// ────────────────────────────────────────────
// Generate 6 months of sales with growth
// ────────────────────────────────────────────
function genSales(products, clients) {
  const sales = [];
  const now = Date.now();
  const DAY = 86400000;

  // Growth curve : ventes/jour par mois
  // M1: ~1.5/j, M2: ~2.3/j, M3: ~3.5/j, M4: ~4.8/j, M5: ~6/j, M6: ~7.5/j
  const monthlyTargets = [
    { daysAgoStart: 180, daysAgoEnd: 150, perDay: 1.5 },
    { daysAgoStart: 150, daysAgoEnd: 120, perDay: 2.3 },
    { daysAgoStart: 120, daysAgoEnd:  90, perDay: 3.5 },
    { daysAgoStart:  90, daysAgoEnd:  60, perDay: 4.8 },
    { daysAgoStart:  60, daysAgoEnd:  30, perDay: 6.0 },
    { daysAgoStart:  30, daysAgoEnd:   0, perDay: 7.5 },
  ];

  let saleId = 1;
  const paymentsWeighted = [
    ...Array(50).fill('Wave'),
    ...Array(25).fill('Orange Money'),
    ...Array(15).fill('Espèces'),
    ...Array(6).fill('MTN Money'),
    ...Array(3).fill('Moov Money'),
    ...Array(1).fill('Crédit client'),
  ];

  // Pondération produits par popularité
  const weightedProducts = [];
  products.forEach(p => { for (let i=0; i<p.pop; i++) weightedProducts.push(p); });

  monthlyTargets.forEach(month => {
    const nDays = month.daysAgoStart - month.daysAgoEnd;
    for (let d = 0; d < nDays; d++) {
      const daysAgo = month.daysAgoEnd + d;
      // varier nombre de ventes ce jour (avec un peu de weekend bonus)
      const jitter = (Math.random() - .4); // skew positif
      let nSales = Math.max(0, Math.round(month.perDay + jitter * 3));
      // weekends boost samedi/dim
      const dt = new Date(now - daysAgo * DAY);
      if (dt.getDay() === 6 || dt.getDay() === 0) nSales = Math.round(nSales * 1.4);

      for (let s = 0; s < nSales; s++) {
        // Possibilité panier multi : 15% des ventes = 2 articles
        const isMultiCart = Math.random() < 0.15;
        const cartId = 'cart_' + (now - daysAgo*DAY) + '_' + saleId;
        const itemsInCart = isMultiCart ? 2 : 1;

        // Heure : majorité entre 10h et 19h
        const hour = randInt(9, 20);
        const minute = randInt(0, 59);
        const saleDate = new Date(now - daysAgo * DAY);
        saleDate.setHours(hour, minute, 0, 0);

        // Client : ~60% des ventes liées à un client connu
        let client = null;
        if (Math.random() < 0.6) {
          // Client créé avant la date de vente
          const eligible = clients.filter(c => c.createdAt <= saleDate.getTime());
          if (eligible.length) client = randPick(eligible);
        }

        const payment = randPick(paymentsWeighted);

        for (let it = 0; it < itemsInCart; it++) {
          const prod = randPick(weightedProducts);
          const qty = 1; // sneakers : toujours 1 unité
          const unitPrice = prod.price;
          const unitCost = prod.cost;
          const total = unitPrice * qty;
          const cost = unitCost * qty;
          const profit = total - cost;

          sales.push({
            id: saleId++,
            cartId,
            productId: prod.id,
            productName: prod.name,
            quantity: qty,
            price: unitPrice,
            unitPrice,
            purchasePrice: unitCost,
            cost,
            total,
            profit,
            date: saleDate.getTime(),
            timestamp: saleDate.toISOString(),
            clientId: client ? client.id : null,
            clientName: client ? client.name : '',
            paymentMethod: payment,
            locationId: 1,
            locationName: 'Boutique Cocody',
            status: 'completed',
          });

          if (client) {
            client.totalSpent += total;
            client.totalOrders += 1;
            client.points += Math.floor(total / 1000); // 1 point / 1000 FCFA
          }
        }
      }
    }
  });

  // Assign loyalty tiers based on totalSpent (mode 'spent')
  clients.forEach(c => {
    // tier thresholds (from default config)
    if (c.totalSpent >= 5000*1000) c.tier = 'platinum';
    else if (c.totalSpent >= 2000*1000) c.tier = 'gold';
    else if (c.totalSpent >= 500*1000) c.tier = 'silver';
    else c.tier = 'bronze';
  });

  return sales;
}

function genStockMovements(products) {
  const movements = [];
  const now = Date.now();
  let mid = 1;
  products.forEach(p => {

    movements.push({
      id: mid++, productId: p.id, productName: p.name,
      type: 'purchase', quantity: 40, reason: 'Réappro initial',
      date: now - 185*86400000, supplierId: 1, cost: p.cost*40,
    });
    // 2-3 réappros intermédiaires
    for (let i = 0; i < 2; i++) {
      const daysAgo = randInt(30, 150);
      movements.push({
        id: mid++, productId: p.id, productName: p.name,
        type: 'purchase', quantity: randInt(10, 25),
        reason: 'Réappro', date: now - daysAgo*86400000,
        supplierId: randPick([1,2,3]), cost: p.cost*randInt(10,25),
      });
    }
  });
  return movements;
}

// ────────────────────────────────────────────

function genActivities() {
  const acts = [];
  const now = Date.now();
  const DAY = 86400000;
  const types = ['sale','stock','member','settings'];
  for (let i = 0; i < 40; i++) {
    const daysAgo = randInt(0, 30);
    acts.push({
      id: uid('act'),
      type: randPick(types),
      message: randPick([
        'Nouvelle vente enregistrée',
        'Stock mis à jour',
        'Client ajouté',
        'Paiement reçu',
        'Réappro effectué',
        'Alerte stock bas',
        'Produit modifié',
      ]),
      date: now - daysAgo*DAY - randInt(0, DAY),
      user: 'Aïcha Koné',
    });
  }
  return acts.sort((a,b) => b.date - a.date);
}

// ────────────────────────────────────────────
// Payment history (from sales)
// ────────────────────────────────────────────
function genPaymentHistory(sales) {
  // Group sales by cartId + payment
  const byCart = {};
  sales.forEach(s => {
    const k = s.cartId;
    if (!byCart[k]) byCart[k] = { total:0, method:s.paymentMethod, date:s.date, clientName:s.clientName };
    byCart[k].total += s.total;
  });
  return Object.entries(byCart).map(([cartId, p], i) => ({
    id: i+1,
    cartId,
    amount: p.total,
    method: p.method,
    date: p.date,
    clientName: p.clientName,
    status: 'confirmed',
  })).sort((a,b) => b.date - a.date);
}
